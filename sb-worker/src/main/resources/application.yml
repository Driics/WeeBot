spring:
  cloud:
    consul:
      enabled: false
      discovery:
        healthCheckPath: /health
        healthCheckInterval: 15s
  application:
    version: "@build.version@"
    timestamp: "@build.timestamp@"
    name: "SablebotBot-Worker"
  datasource:
    url: ${DB_URL}
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    overwriteExistingJobs: true
    properties:
      org.quartz.scheduler.instanceName: "sablebot-spring-boot-quartz"
      org.quartz.scheduler.instanceId: "AUTO"
      org.quartz.threadPool.threadCount: "15"
      org.quartz.jobStore.tablePrefix: "qrtz_"
  liquibase:
    change-log: "classpath:db/master.xml"
  kafka:
    bootstrap-servers: ${sablebot.common.kafka.bootstrap-servers}
    consumer:
      group-id: ${sablebot.common.kafka.group-id}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.sablebot.common.model.*"
        max.partition.fetch.bytes: 10485760  # 10MB
        max.poll.records: 500
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        max.request.size: 10485760  # 10MB
        batch.size: 16384

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: sablebot
  prometheus:
    metrics:
      export:
        enabled: true


sablebot:
  common:
    kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
      group-id: "sablebot-worker-group"
  worker:
    discord:
      token: ${DISCORD_TOKEN}
      playingStatus: "Still testing"
      shardsTotal: 1
    commands:
      invokeLogging: true
    support:
      guild-id: 763252709833965579
      emergency-channel-id: 924575732989034506

server:
  servlet:
    encoding:
      charset: "UTF-8"
      enabled: true
      force: true