spring:
  cloud:
    consul:
      enabled: false
      discovery:
        healthCheckPath: /health
        healthCheckInterval: 15s
  application:
    version: "@build.version@"
    timestamp: "@build.timestamp@"
    name: "SablebotBot-Worker"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: SablebotHikariPool
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    overwriteExistingJobs: true
    properties:
      org.quartz.scheduler.instanceName: "sablebot-spring-boot-quartz"
      org.quartz.scheduler.instanceId: "AUTO"
      org.quartz.threadPool.threadCount: "15"
      org.quartz.jobStore.tablePrefix: "qrtz_"
  liquibase:
    change-log: "classpath:db/master.xml"
  kafka:
    bootstrap-servers: ${sablebot.common.kafka.bootstrap-servers}
    consumer:
      group-id: ${sablebot.common.kafka.group-id}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.sablebot.common.model.*"
        max.partition.fetch.bytes: 10485760  # 10MB
        max.poll.records: 500
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        max.request.size: 10485760  # 10MB
        batch.size: 16384

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: sablebot
    distribution:
      percentiles-histogram:
        sablebot.commands.duration: true
        sablebot.events.duration: true
        sablebot.coroutine.job.duration: true
      slo:
        sablebot.commands.duration: 100ms,500ms,1s,5s
        sablebot.events.duration: 10ms,50ms,100ms,500ms
  tracing:
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true
  zipkin:
    tracing:
      endpoint: ${TEMPO_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

sablebot:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  common:
    kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
      group-id: "sablebot-worker-group"
  worker:
    discord:
      token: ${DISCORD_TOKEN}
      playingStatus: "Still testing"
      shardsTotal: 1
    commands:
      invokeLogging: true
    audio:
      resamplingQuality: MEDIUM
      searchProvider: youTube
      frameBufferDuration: 2000
      itemLoaderThreadPoolSize: 500
      panelRefreshInterval: 5000
      lavalink:
        enabled: true
        nodes:
          - name: primary
            url: ws://${LAVALINK_HOST:localhost}:${LAVALINK_PORT:2333}
            password: ${LAVALINK_PASSWORD:youshallnotpass}
    support:
      guild-id: 763252709833965579
      emergency-channel-id: 924575732989034506
  feeds:
    limits:
      max-feeds-per-guild: 10
      max-notification-history-days: 30
    polling:
      default-interval-seconds: 900
      reddit-interval-seconds: 300
      twitch-interval-seconds: 120
      youtube-interval-seconds: 600
      core-pool-size: 2
      max-pool-size: 4
    reddit:
      enabled: true
      user-agent: "SableBot/1.0 Discord Bot"
      rate-limit-requests-per-minute: 60
    twitch:
      enabled: true
      client-id: ${TWITCH_CLIENT_ID:}
      client-secret: ${TWITCH_CLIENT_SECRET:}
      rate-limit-requests-per-minute: 800
    youtube:
      enabled: true
      api-key: ${YOUTUBE_API_KEY:}
      rate-limit-quota-per-day: 10000

server:
  servlet:
    encoding:
      charset: "UTF-8"
      enabled: true
      force: true