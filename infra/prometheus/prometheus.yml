global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "sablebot-worker"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["sablebot-worker:9090"]
        labels:
          app: "sablebot-worker"

  - job_name: "sablebot-api"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "sablebot-api:9090" ]
        labels:
          app: "sablebot-api"
